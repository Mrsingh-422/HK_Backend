<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Kangaroo | Find Labs</title>
    
    <!-- External Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --hk-success: #00b894;
            --hk-dark: #2d3436;
            --hk-bg: #f4f7f6;
            --hk-border: #edf2f7;
            --hk-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--hk-bg); color: var(--hk-dark); min-height: 100vh; display: flex; overflow-x: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: white; height: 100vh; position: fixed; border-right: 1px solid var(--hk-border); padding: 30px 20px; z-index: 1050; }
        .sidebar-brand { font-weight: 800; font-size: 1.5rem; color: var(--hk-success); margin-bottom: 50px; display: flex; align-items: center; gap: 12px; }
        .nav-link-custom { color: #636e72; padding: 14px 20px; border-radius: 18px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; font-weight: 600; display: flex; align-items: center; text-decoration: none; }
        .nav-link-custom:hover, .nav-link-custom.active { background: #e3fcef; color: var(--hk-success); }
        .nav-link-custom i { width: 35px; font-size: 1.2rem; }

        /* Main Area */
        .main-content { margin-left: 280px; width: calc(100% - 280px); padding: 40px 60px; min-height: 100vh; }
        .tab-content { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards */
        .hk-card { background: white; border-radius: 25px; border: 1px solid transparent; box-shadow: var(--hk-shadow); padding: 25px; transition: all 0.3s ease; height: 100%; position: relative; }
        .hk-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-color: var(--hk-success); }
        
        .lab-img { width: 100%; height: 160px; object-fit: cover; border-radius: 18px; margin-bottom: 15px; background: #eee; }
        .chip-badge { font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 50px; margin-right: 5px; text-transform: uppercase; }
        .chip-home { background: #e3fcef; color: #00b894; }
        .chip-rapid { background: #fff4e5; color: #ff9f00; }
        
        /* Suggestion Box Styles */
        .suggestion-box { position: absolute; background: white; width: 100%; z-index: 1000; border-radius: 15px; box-shadow: var(--hk-shadow); margin-top: 5px; max-height: 300px; overflow-y: auto; border: 1px solid var(--hk-border); }
        .suggestion-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #f8f9fa; transition: 0.2s; }
        .suggestion-item:hover { background: #e3fcef; }

        .btn-hk { background: var(--hk-success); color: white; border-radius: 50px; padding: 12px 35px; border: none; font-weight: 700; transition: 0.3s; }
        .hidden { display: none !important; }
        .fw-800 { font-weight: 800; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar shadow-sm">
        <div class="sidebar-brand"><i class="fas fa-hand-holding-medical"></i><span>HK.User</span></div>
        <nav>
            <div class="nav-link-custom active" onclick="switchSection('labSec')">
                <i class="fas fa-search-location"></i><span>Find Labs</span>
            </div>
            <div class="nav-link-custom" onclick="switchSection('profileSec')">
                <i class="fas fa-user-circle"></i><span>My Profile</span>
            </div>
            <hr class="my-4" style="opacity: 0.1;">
            <div class="nav-link-custom text-danger" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i><span>Sign Out</span>
            </div>
        </nav>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        
        <!-- SECTION: LAB DISCOVERY -->
        <section id="labSec" class="tab-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-800 m-0">Discover Labs</h2>
                <div id="locationStatus" class="small text-muted fw-bold text-uppercase"></div>
            </div>
            
            <div class="row g-3 mb-5">
                <!-- 1. City/Area Search with Strict Match Suggestions -->
                <div class="col-md-5 position-relative">
                    <div class="input-group input-group-lg bg-white rounded-pill overflow-hidden shadow-sm border">
                        <span class="input-group-text bg-transparent border-0"><i class="fas fa-map-marker-alt text-danger"></i></span>
                        <input type="text" id="citySearch" class="form-control border-0" placeholder="City or Area..." onkeyup="fetchCitySuggestions(this.value)">
                    </div>
                    <div id="citySuggestionList" class="suggestion-box hidden"></div>
                </div>

                <!-- 2. Lab Name Search with Live Suggestions -->
                <div class="col-md-5 position-relative">
                    <div class="input-group input-group-lg bg-white rounded-pill overflow-hidden shadow-sm border">
                        <span class="input-group-text bg-transparent border-0"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" id="labNameSearch" class="form-control border-0" placeholder="Search Lab Name..." onkeyup="fetchLabNameSuggestions(this.value)">
                    </div>
                    <div id="labNameSuggestionList" class="suggestion-box hidden"></div>
                </div>
                
                <!-- 3. GPS Button -->
                <div class="col-md-2">
                    <button class="btn btn-outline-success w-100 h-100 rounded-pill fw-bold" onclick="getUserLocation()">
                        <i class="fas fa-location-arrow me-2"></i>Near Me
                    </button>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div id="lab-loading" class="text-center py-5 hidden">
                <div class="spinner-border text-success"></div>
                <p class="mt-2 text-muted fw-bold">Fetching Best Labs...</p>
            </div>

            <!-- Lab Results Grid -->
            <div class="row g-4" id="labGrid"></div>
        </section>

        <!-- SECTION: PROFILE -->
        <section id="profileSec" class="tab-content hidden">
            <h2 class="fw-800 mb-4">My Account</h2>
            <div class="hk-card" id="profileViewArea"></div>
        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_BASE = "http://localhost:5002";
        const TOKEN = localStorage.getItem('token');

        let userLat = null, userLng = null;
        
        // Strict matching filters for clicked suggestions
        let selectedLoc = { city: null, state: null, country: null };

        // --- NAVIGATION ---
        function switchSection(id) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-link-custom').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            event.target.closest('.nav-link-custom').classList.add('active');
            if(id === 'labSec') loadLabs();
            if(id === 'profileSec') loadProfile();
        }

        // --- 1. CITY SUGGESTIONS (STRICT MATCH) ---
        async function fetchCitySuggestions(query) {
            const box = document.getElementById('citySuggestionList');
            if(query.length < 2) { box.classList.add('hidden'); return; }
            
            try {
                const res = await fetch(`${API_BASE}/user/labs/suggestions?query=${query}`);
                const result = await res.json();
                
                if(result.data.length > 0) {
                    box.classList.remove('hidden');
                    box.innerHTML = result.data.map(s => `
                        <div class="suggestion-item" onclick="selectCity('${s.city}', '${s.state}', '${s.country}')">
                            <div class="d-flex align-items-center">
                                <i class="fas fa-city me-3 text-muted"></i>
                                <div>
                                    <div class="fw-bold">${s.city}</div>
                                    <small class="text-muted">${s.state}, ${s.country}</small>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else { box.classList.add('hidden'); }
            } catch (err) { console.error(err); }
        }

        function selectCity(city, state, country) {
            document.getElementById('citySearch').value = `${city}, ${state}`;
            selectedLoc = { city, state, country }; // Capture strict metadata
            document.getElementById('citySuggestionList').classList.add('hidden');
            loadLabs();
        }

        // --- 2. LAB NAME SUGGESTIONS ---
        async function fetchLabNameSuggestions(query) {
            const box = document.getElementById('labNameSuggestionList');
            if(query.length < 2) { 
                box.classList.add('hidden'); 
                loadLabs(); // Reload all if cleared
                return; 
            }
            
            try {
                // Endpoint: /user/labs/name-suggestions
                const res = await fetch(`${API_BASE}/user/labs/lab-suggestions?query=${query}`);
                const result = await res.json();
                
                if(result.data.length > 0) {
                    box.classList.remove('hidden');
                    box.innerHTML = result.data.map(s => `
                        <div class="suggestion-item" onclick="selectLabName('${s.name}')">
                            <div class="d-flex align-items-center">
                                <img src="${s.image || 'https://placehold.co/30'}" class="rounded-circle me-3 border" width="30" height="30" onerror="this.src='https://placehold.co/30'">
                                <div>
                                    <div class="fw-bold small">${s.name}</div>
                                    <small class="text-muted" style="font-size: 10px;">${s.city}</small>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else { 
                    box.classList.add('hidden'); 
                    loadLabs(); // Just perform a normal search hit
                }
            } catch (err) { console.error(err); }
        }

        function selectLabName(name) {
            document.getElementById('labNameSearch').value = name;
            document.getElementById('labNameSuggestionList').classList.add('hidden');
            loadLabs();
        }

        // --- 3. GEOLOCATION ---
        function getUserLocation() {
            if (navigator.geolocation) {
                document.getElementById('locationStatus').innerText = "Fetching Coordinates...";
                navigator.geolocation.getCurrentPosition((pos) => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    selectedLoc = { city: null, state: null, country: null }; // Reset city filters
                    document.getElementById('citySearch').value = "";
                    document.getElementById('locationStatus').innerText = "📍 Using Near Me";
                    loadLabs();
                });
            }
        }

        // --- 4. MAIN LOAD LABS (POST API) ---
        async function loadLabs() {
            const grid = document.getElementById('labGrid');
            const loader = document.getElementById('lab-loading');
            loader.classList.remove('hidden');

            const searchName = document.getElementById('labNameSearch').value;
            const cityInputText = document.getElementById('citySearch').value;

            // Reset strict city metadata if input is cleared manually
            if (!cityInputText) {
                selectedLoc = { city: null, state: null, country: null };
            }

            try {
                const res = await fetch(`${API_BASE}/user/labs/list`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: JSON.stringify({ 
                        lat: userLat, 
                        lng: userLng, 
                        search: searchName, // Used for lab name filter
                        city: selectedLoc.city,
                        state: selectedLoc.state,
                        country: selectedLoc.country
                    })
                });
                
                const result = await res.json();
                loader.classList.add('hidden');
                
                if(!result.data || result.data.length === 0) {
                    grid.innerHTML = `<div class="col-12 text-center py-5"><h5>No Labs Found</h5><p class="text-muted">Try a different search term or city.</p></div>`;
                    return;
                }

                grid.innerHTML = result.data.map(lab => `
                    <div class="col-md-4">
                        <div class="hk-card d-flex flex-column">
                            <img src="${lab.profileImage ? lab.profileImage : 'https://placehold.co/400x250?text='+lab.name}" class="lab-img">
                            
                            <div class="d-flex justify-content-between align-items-start">
                                <h5 class="fw-800 m-0">${lab.name}</h5>
                                <span class="badge bg-success"><i class="fas fa-star me-1"></i>${lab.rating}</span>
                            </div>
                            
                            <p class="text-muted small mt-1 mb-2">
                                <i class="fas fa-map-marker-alt me-1 text-danger"></i> ${lab.city}, ${lab.state}
                                ${lab.distance !== "N/A" ? `<span class="ms-2 fw-bold text-dark">• ${lab.distance} KM</span>` : ''}
                            </p>
                            
                            <div class="mb-3">
                                ${lab.isHomeCollectionAvailable ? '<span class="chip-badge chip-home"><i class="fas fa-house-user me-1"></i>Home Visit</span>' : ''}
                                ${lab.isRapidServiceAvailable ? '<span class="chip-badge chip-rapid"><i class="fas fa-bolt me-1"></i>Rapid</span>' : ''}
                            </div>

                            <div class="mt-auto d-flex justify-content-between align-items-center border-top pt-3">
                                <div>
                                    <small class="text-muted d-block" style="font-size: 11px;">Starting From</small>
                                    <h5 class="fw-800 text-success m-0">₹${lab.startingPrice}</h5>
                                </div>
                                <button class="btn btn-dark btn-sm rounded-pill px-4 fw-bold">Book Now</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) { loader.classList.add('hidden'); }
        }

        // --- 5. PROFILE & UTILS ---
        async function loadProfile() {
            try {
                const res = await fetch(`${API_BASE}/api/auth/user/profile`, { headers: {'Authorization': `Bearer ${TOKEN}`} });
                const result = await res.json();
                const u = result.data;
                document.getElementById('profileViewArea').innerHTML = `
                    <div class="row align-items-center">
                        <div class="col-md-2"><img src="https://ui-avatars.com/api/?name=${u.name}&background=00b894&color=fff&size=100" class="rounded-circle shadow-sm"></div>
                        <div class="col-md-10"><h3 class="fw-800 m-0">${u.name}</h3><p class="text-muted m-0">${u.email}</p><p class="text-muted m-0">${u.phone || 'No phone linked'}</p></div>
                    </div>`;
            } catch (err) { console.error(err); }
        }

        function handleLogout() { localStorage.clear(); window.location.href = "login.html"; }

        // Close suggestions on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#citySearch')) document.getElementById('citySuggestionList').classList.add('hidden');
            if (!e.target.closest('#labNameSearch')) document.getElementById('labNameSuggestionList').classList.add('hidden');
        });

        window.onload = () => {
            if(!TOKEN) window.location.href = "login.html";
            loadLabs(); // Defaults to Delhi fallback via Backend
        };
    </script>
</body>
</html>

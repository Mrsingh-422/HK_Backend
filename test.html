<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Driver | Delivery Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

    <style>
        :root {
            --hk-primary: #00b894;
            --hk-dark: #1e272e;
            --hk-bg: #f8fafc;
            --hk-card-shadow: 0 10px 30px rgba(0,0,0,0.05);
            --hk-radius: 24px;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--hk-bg); padding-bottom: 100px; }
        .driver-nav { background: white; padding: 20px; border-bottom: 2px solid var(--hk-primary); position: sticky; top: 0; z-index: 100; }
        .hk-card { background: white; border-radius: var(--hk-radius); border: none; box-shadow: var(--hk-card-shadow); margin-bottom: 20px; overflow: hidden; }
        .status-badge { padding: 6px 16px; border-radius: 50px; font-weight: 800; font-size: 11px; text-transform: uppercase; }
        .btn-hk { background: var(--hk-primary); color: white; border-radius: 50px; font-weight: 700; border: none; padding: 12px 25px; }
        
        /* Bottom Navigation for Driver */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #eee; }
        .nav-item { text-align: center; color: #94a3b8; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--hk-primary); }
        .nav-item i { font-size: 1.4rem; display: block; }
        .nav-item span { font-size: 10px; font-weight: 700; }

        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body>

    <div class="driver-nav d-flex justify-content-between align-items-center">
        <h5 class="fw-800 m-0">Driver Dashboard</h5>
        <div id="driverStatusArea"><span class="status-badge bg-success text-white">Online</span></div>
    </div>

    <div class="container mt-4">
        <!-- 1. NEW TASKS (Assigned Status) -->
        <section id="tasksView" class="view-section active">
            <h6 class="fw-800 mb-3 text-muted">New Delivery Requests</h6>
            <div id="newRequestsList"></div>
        </section>

        <!-- 2. ACTIVE DELIVERIES (Accepted/Picked/OutForDelivery) -->
        <section id="activeView" class="view-section">
            <h6 class="fw-800 mb-3 text-muted">Active Deliveries</h6>
            <div id="activeList"></div>
        </section>

        <!-- 3. HISTORY -->
        <section id="historyView" class="view-section">
            <h6 class="fw-800 mb-3 text-muted">Completed Tasks</h6>
            <div id="completedList"></div>
        </section>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchDriverView('tasksView', this)"><i class="fas fa-list-ul"></i><span>New Tasks</span></div>
        <div class="nav-item" onclick="switchDriverView('activeView', this)"><i class="fas fa-truck-loading"></i><span>Active</span></div>
        <div class="nav-item" onclick="switchDriverView('historyView', this)"><i class="fas fa-history"></i><span>History</span></div>
    </nav>

    <script>
        const API_URL = 'http://localhost:5002';
        const AUTH_TOKEN = localStorage.getItem('pharmacydriver'); // Driver Token

        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = {
                method,
                headers: { 'Authorization': `Bearer ${AUTH_TOKEN}`, 'Content-Type': 'application/json' }
            };
            if(body) options.body = JSON.stringify(body);
            const res = await fetch(`${API_URL}${endpoint}`, options);
            return await res.json();
        }

        function switchDriverView(id, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'tasksView') loadTasks();
            if(id === 'activeView') loadActive();
            if(id === 'historyView') loadHistory();
        }

        // LOAD NEW REQUESTS (Figma: Accept/Reject logic)
        async function loadTasks() {
            const res = await apiCall('/driver/pharmacy/orders/list');
            const data = res.data.filter(o => o.deliveryStatus === 'Assigned');
            document.getElementById('newRequestsList').innerHTML = data.map(o => `
                <div class="hk-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="status-badge bg-warning text-dark">New Assigned</span>
                        <b class="text-primary">#${o.orderId}</b>
                    </div>
                    <p class="mb-1"><b>Patient:</b> ${o.address.name}</p>
                    <p class="mb-1 text-muted small"><i class="fas fa-map-marker-alt me-1"></i>${o.address.houseNo}, ${o.address.city}</p>
                    <hr>
                    <div class="d-flex gap-2">
                        <button class="btn btn-danger flex-fill rounded-pill" onclick="respondOrder('${o._id}', 'Reject')">Reject</button>
                        <button class="btn btn-hk flex-fill rounded-pill" onclick="respondOrder('${o._id}', 'Accept')">Accept</button>
                    </div>
                </div>
            `).join('') || '<div class="text-center py-5 text-muted">No new tasks</div>';
        }

        async function respondOrder(orderId, action) {
            const res = await apiCall('/driver/pharmacy/orders/respond', 'POST', { orderId, action });
            if(res.success) {
                Swal.fire('Success', `Order ${action}ed`, 'success');
                loadTasks();
            }
        }

        // LOAD ACTIVE (Figma Workflow: Pickup -> Out -> Reached -> OTP)
        async function loadActive() {
            const res = await apiCall('/driver/pharmacy/orders/list');
            const data = res.data.filter(o => ['Accepted', 'PickedUp', 'OutForDelivery', 'ReachedLocation'].includes(o.deliveryStatus));
            document.getElementById('activeList').innerHTML = data.map(o => {
                let btnText = "Mark Picked Up", nextStatus = "PickedUp";
                if(o.deliveryStatus === 'PickedUp') { btnText = "Start Delivery"; nextStatus = "OutForDelivery"; }
                if(o.deliveryStatus === 'OutForDelivery') { btnText = "Reached Location"; nextStatus = "ReachedLocation"; }
                
                return `
                    <div class="hk-card p-4">
                        <div class="d-flex justify-content-between mb-2">
                            <b class="text-primary">#${o.orderId}</b>
                            <span class="status-badge bg-info text-white">${o.deliveryStatus}</span>
                        </div>
                        <p class="mb-1"><b>${o.address.name}</b> • <a href="tel:${o.address.phone}" class="text-success text-decoration-none">${o.address.phone}</a></p>
                        <p class="small text-muted mb-3">${o.address.houseNo}, ${o.address.city}</p>
                        
                        ${o.deliveryStatus === 'ReachedLocation' ? 
                            `<div class="mt-3">
                                <input type="text" id="otp-${o._id}" class="form-control mb-2 text-center fw-bold" placeholder="Enter 4-Digit OTP">
                                <button class="btn btn-success w-100 rounded-pill" onclick="verifyDelivery('${o._id}')">Complete Delivery</button>
                            </div>` :
                            `<button class="btn btn-hk w-100" onclick="updateStatus('${o._id}', '${nextStatus}')">${btnText}</button>`
                        }
                        
                        <button class="btn btn-link text-danger w-100 btn-sm mt-2" onclick="reportIssue('${o._id}')">Report Issue</button>
                    </div>
                `;
            }).join('') || '<div class="text-center py-5 text-muted">No active deliveries</div>';
        }

        async function updateStatus(orderId, status) {
            const res = await apiCall('/driver/pharmacy/orders/update-progress', 'PATCH', { orderId, status });
            if(res.success) {
                if(status === 'ReachedLocation') Swal.fire('OTP Sent', 'An OTP has been sent to the patient.', 'info');
                loadActive();
            }
        }

        async function verifyDelivery(orderId) {
            const otp = document.getElementById(`otp-${orderId}`).value;
            const res = await apiCall('/driver/pharmacy/orders/verify-otp', 'POST', { orderId, otp });
            if(res.success) {
                Swal.fire('Delivered!', 'Order completed successfully', 'success');
                loadActive();
            } else {
                Swal.fire('Error', 'Invalid OTP', 'error');
            }
        }

        async function reportIssue(orderId) {
            const { value: issue } = await Swal.fire({
                title: 'Report Issue',
                input: 'select',
                inputOptions: { 'UserUnreachable': 'User Unreachable', 'UserRefused': 'User Refused' },
                showCancelButton: true
            });
            if(issue) {
                const res = await apiCall('/driver/pharmacy/orders/report-issue', 'POST', { orderId, issueType: issue });
                if(res.success) loadActive();
            }
        }

        async function loadHistory() {
            const res = await apiCall('/driver/pharmacy/orders/list');
            const data = res.data.filter(o => ['Delivered', 'CancelledByDriver', 'UserUnreachable'].includes(o.deliveryStatus));
            document.getElementById('completedList').innerHTML = data.map(o => `
                <div class="hk-card p-3 border-start border-4 ${o.deliveryStatus==='Delivered'?'border-success':'border-danger'}">
                    <b>#${o.orderId}</b> - ${o.deliveryStatus}<br>
                    <small class="text-muted">${moment(o.updatedAt).format('DD MMM YYYY, hh:mm A')}</small>
                </div>
            `).join('');
        }

        window.onload = loadTasks;
    </script>
</body>
</html>

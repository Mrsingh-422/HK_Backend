<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Kangaroo | Manage Lab Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .form-container { max-width: 950px; margin: auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .tab-btn { cursor: pointer; padding: 12px 25px; border: none; background: #e9ecef; border-radius: 10px; margin-right: 10px; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: #198754; color: white; }
        .hidden { display: none; }
        .master-preview { background: #f8fdfa; border: 1px dashed #198754; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .tag { display: inline-block; background: #e8f5e9; color: #1b5e20; padding: 3px 12px; border-radius: 50px; font-size: 0.75rem; margin: 3px; font-weight: 600; }
        .std-price-badge { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; padding: 2px 8px; border-radius: 4px; font-size: 0.78rem; font-weight: bold; }
        .scrollable-box { max-height: 200px; overflow-y: auto; background: #fff; border: 1px solid #dee2e6; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="form-container">
    <h3 class="text-center mb-4 text-success fw-bold">Manage Lab Services</h3>
    
    <div class="d-flex justify-content-center mb-4">
        <button class="tab-btn active" id="btn-test" onclick="switchTab('testForm')">Add Single Test</button>
        <button class="tab-btn" id="btn-pkg" onclick="switchTab('packageForm')">Manage Packages</button>
    </div>

    <!-- 1. ADD SINGLE TEST -->
    <form id="testForm">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Main Category</label>
                <select id="mainCategory" class="form-select" onchange="loadMasterTests()" required>
                    <option value="">Select Category</option>
                    <option value="Pathology">Pathology</option>
                    <option value="Radiology">Radiology</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Search Master Test</label>
                <select id="masterTestId" class="form-select" onchange="autoFillTestDetails()" required>
                    <option value="">Select Category First</option>
                </select>
            </div>
        </div>

        <div id="masterPreview" class="master-preview hidden">
            <h6 class="text-success fw-bold"><i class="fas fa-info-circle me-2"></i>Master Info & Catalog Price</h6>
            <div class="row mt-3">
                <div class="col-md-4"><small class="text-muted">Sample Type:</small> <p id="prevSample" class="fw-bold">-</p></div>
                <div class="col-md-4"><small class="text-muted">Catalog MRP:</small> <p class="text-danger fw-bold">₹<span id="prevMrp">-</span></p></div>
                <div class="col-md-4"><small class="text-muted">Category:</small> <p id="prevCat" class="fw-bold">-</p></div>
            </div>
            <div class="mb-2"><small class="text-muted">Included Parameters:</small> <div id="prevParams"></div></div>
            <div><small class="text-muted">Standard Preparation:</small> <p id="prevPrep" class="small italic">-</p></div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Your MRP (₹)</label>
                <input type="number" id="amount" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">Discount %</label><input type="number" id="discountPercent" class="form-control" value="0"></div>
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">Report Time (TAT)</label><input type="text" id="reportTime" class="form-control" placeholder="e.g. 12 Hours" required></div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Service Type</label>
                <select id="testType" class="form-select">
                    <option value="Both">Both (Home & Walk-In)</option>
                    <option value="Home Collection">Home Collection Only</option>
                    <option value="Walk-In">Walk-In Only</option>
                </select>
            </div>
            <div class="col-md-6 mb-3"><label class="form-label fw-bold">Special Instructions</label><textarea id="precaution" class="form-control" rows="1"></textarea></div>
        </div>

        <button type="submit" class="btn btn-success btn-lg w-100 mt-3 fw-bold shadow-sm">LIST TEST IN MY LAB</button>
    </form>

    <!-- 2. MANAGE PACKAGE -->
    <form id="packageForm" class="hidden">
        <div class="mb-4">
            <label class="form-label fw-bold">Selection Mode</label>
            <select id="pkgMode" class="form-select bg-light fw-bold" onchange="togglePackageMode()">
                <option value="master">Pick from Admin Master Templates</option>
                <option value="custom">Create My Own Custom Combo</option>
            </select>
        </div>

        <!-- Master Section -->
        <div id="masterPkgSection">
            <div class="mb-3">
                <label class="form-label fw-bold">Select Master Template</label>
                <select id="masterPackageId" class="form-select" onchange="autoFillPkgDetails()" required>
                    <option value="">Loading Templates...</option>
                </select>
            </div>
            <div id="pkgMasterPreview" class="alert alert-info py-2 hidden">
                <small><i class="fas fa-tag me-1"></i> Catalog MRP: <b>₹<span id="stdPkgMrp">0</span></b> | Suggested TAT: <b id="stdPkgTat">-</b></small>
            </div>
        </div>

        <!-- Custom Section -->
        <div id="customPkgSection" class="hidden">
            <div class="mb-3">
                <label class="form-label fw-bold">Custom Package Name</label>
                <input type="text" id="customName" class="form-control" placeholder="e.g. Full Body Diamond Package">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Select Master Tests to Combine</label>
                <div id="testCheckboxes" class="scrollable-box"></div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Package MRP (₹)</label>
                <input type="number" id="pkgMrp" class="form-control border-primary" required>
            </div>
            <div class="col-md-6 mb-3"><label class="form-label fw-bold">Discount %</label><input type="number" id="pkgDiscount" class="form-control" value="0"></div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Gender</label>
                <select id="pkgGender" class="form-select">
                    <option value="Both">Both</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">Age Group</label><input type="text" id="pkgAge" class="form-control" value="All Ages"></div>
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">Report TAT</label><input type="text" id="pkgTat" class="form-control" placeholder="e.g. 24 Hours" required></div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 mt-3 fw-bold shadow-sm">LAUNCH PACKAGE</button>
    </form>
</div>

<script>
    const BASE_URL = 'http://localhost:5002';
    const token = localStorage.getItem('labtoken');

    function switchTab(formId) {
        document.getElementById('testForm').classList.add('hidden');
        document.getElementById('packageForm').classList.add('hidden');
        document.getElementById(formId).classList.remove('hidden');
        document.getElementById('btn-test').classList.toggle('active', formId === 'testForm');
        document.getElementById('btn-pkg').classList.toggle('active', formId === 'packageForm');
        
        if(formId === 'packageForm') {
            loadTemplates();
            togglePackageMode(); // Ensure required fields are set correctly
        }
    }

    // --- MODE TOGGLE (CRITICAL FIX FOR FOCUS ERROR) ---
    function togglePackageMode() {
        const mode = document.getElementById('pkgMode').value;
        const isMaster = mode === 'master';
        
        document.getElementById('masterPkgSection').classList.toggle('hidden', !isMaster);
        document.getElementById('customPkgSection').classList.toggle('hidden', isMaster);

        // Required logic to prevent "Not Focusable" error
        const masterSelect = document.getElementById('masterPackageId');
        const customInput = document.getElementById('customName');

        if(isMaster) {
            masterSelect.setAttribute('required', 'required');
            customInput.removeAttribute('required');
        } else {
            masterSelect.removeAttribute('required');
            customInput.setAttribute('required', 'required');
            loadTestCheckboxes();
        }
    }

    // --- TEST LOGIC ---
    async function loadMasterTests() {
        const cat = document.getElementById('mainCategory').value;
        const res = await fetch(`${BASE_URL}/provider/labs/services/tests/standard-catalog?mainCategory=${cat}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const json = await res.json();
        const select = document.getElementById('masterTestId');
        select.innerHTML = '<option value="">Select Test Name</option>';
        json.data.forEach(t => select.innerHTML += `<option value="${t._id}">${t.testName}</option>`);
    }

    async function autoFillTestDetails() {
        const id = document.getElementById('masterTestId').value;
        if(!id) return;
        const res = await fetch(`${BASE_URL}/provider/labs/services/tests/master-details/${id}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const json = await res.json();
        const d = json.data;

        document.getElementById('masterPreview').classList.remove('hidden');
        document.getElementById('prevSample').innerText = d.sampleType || 'N/A';
        document.getElementById('prevMrp').innerText = d.standardMRP || 0;
        document.getElementById('prevCat').innerText = d.category || 'General';
        document.getElementById('prevPrep').innerText = d.pretestPreparation || 'No special preparation';
        document.getElementById('prevParams').innerHTML = d.parameters.map(p => `<span class="tag">${p}</span>`).join('');
        
        document.getElementById('amount').value = d.standardMRP || 0;
        document.getElementById('precaution').value = d.pretestPreparation || '';
    }

    // --- PACKAGE LOGIC ---
    async function loadTemplates() {
        const res = await fetch(`${BASE_URL}/provider/labs/services/packages/standard-catalog`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const json = await res.json();
        const select = document.getElementById('masterPackageId');
        select.innerHTML = '<option value="">Choose Template</option>';
        json.data.forEach(p => select.innerHTML += `<option value="${p._id}">${p.packageName}</option>`);
    }

    async function autoFillPkgDetails() {
        const id = document.getElementById('masterPackageId').value;
        if(!id) return;
        const res = await fetch(`${BASE_URL}/provider/labs/services/packages/master-details/${id}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const json = await res.json();
        const d = json.data;

        document.getElementById('pkgMasterPreview').classList.remove('hidden');
        document.getElementById('stdPkgMrp').innerText = d.standardMRP || 0;
        document.getElementById('stdPkgTat').innerText = d.reportTime || '24 hrs';

        document.getElementById('pkgMrp').value = d.standardMRP || 0;
        document.getElementById('pkgTat').value = d.reportTime || '24 Hours';
    }

    async function loadTestCheckboxes() {
        const res = await fetch(`${BASE_URL}/provider/labs/services/tests/standard-catalog`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const json = await res.json();
        document.getElementById('testCheckboxes').innerHTML = json.data.map(t => `
            <div class="form-check mb-2 border-bottom pb-1">
                <input class="form-check-input pkg-cb" type="checkbox" value="${t._id}" id="chk${t._id}">
                <label class="form-check-label small d-block" for="chk${t._id}">
                    <b>${t.testName}</b> <br> <small class="text-muted">${t.mainCategory} | Sample: ${t.sampleType}</small>
                </label>
            </div>
        `).join('');
    }

    // --- SUBMISSION LOGIC ---
    document.getElementById('testForm').onsubmit = async (e) => {
        e.preventDefault();
        const body = {
            masterTestId: document.getElementById('masterTestId').value,
            amount: document.getElementById('amount').value,
            discountPercent: document.getElementById('discountPercent').value,
            reportTime: document.getElementById('reportTime').value,
            precaution: document.getElementById('precaution').value,
            testType: document.getElementById('testType').value
        };
        const res = await fetch(`${BASE_URL}/provider/labs/services/tests/save`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if((await res.json()).success) { alert("Test Successfully Listed!"); location.reload(); }
    };

    document.getElementById('packageForm').onsubmit = async (e) => {
        e.preventDefault();
        const mode = document.getElementById('pkgMode').value;
        const body = {
            mrp: document.getElementById('pkgMrp').value,
            discountPercent: document.getElementById('pkgDiscount').value,
            reportTime: document.getElementById('pkgTat').value,
            gender: document.getElementById('pkgGender').value,
            ageGroup: document.getElementById('pkgAge').value
        };

        if(mode === 'master') {
            body.masterPackageId = document.getElementById('masterPackageId').value;
        } else {
            body.packageName = document.getElementById('customName').value;
            const selected = Array.from(document.querySelectorAll('.pkg-cb:checked')).map(c => c.value);
            if(selected.length === 0) return alert("Please select at least one test");
            body.tests = JSON.stringify(selected);
        }

        const res = await fetch(`${BASE_URL}/provider/labs/services/packages/save`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if((await res.json()).success) { alert("Package Successfully Launched!"); location.reload(); }
    };
</script>
</body>
</html>

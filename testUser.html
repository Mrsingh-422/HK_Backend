<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Provider | Pharmacy Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

    <style>
        :root {
            --hk-primary: #00b894;
            --hk-dark: #1e272e;
            --hk-bg: #f8f9fa;
            --hk-border: #edf2f7;
            --hk-radius: 20px;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--hk-bg); color: var(--hk-dark); padding-top: 80px; }

        /* Navigation */
        .hk-nav {
            background: white; height: 75px; border-bottom: 2px solid var(--hk-primary);
            position: fixed; top: 0; width: 100%; z-index: 1050;
            display: flex; align-items: center; justify-content: space-between; padding: 0 5%;
        }
        .nav-link { font-weight: 700; color: #555; cursor: pointer; padding: 10px 20px; border-radius: 50px; transition: 0.3s; }
        .nav-link.active { background: var(--hk-primary); color: white; }

        /* Cards */
        .hk-card { background: white; border-radius: var(--hk-radius); border: 1px solid var(--hk-border); padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); height: 100%; }
        .status-badge { padding: 5px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        
        /* Sidebar/Toggling */
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Inventory Image */
        .med-thumb { width: 50px; height: 50px; object-fit: contain; border-radius: 10px; background: #f1f1f1; }
        
        .btn-hk { background: var(--hk-primary); color: white; font-weight: 700; border-radius: 50px; padding: 10px 25px; border: none; }
        .btn-hk:hover { background: #009475; color: white; }

        /* Tabs */
        .hk-tabs { background: #eee; border-radius: 50px; padding: 5px; display: inline-flex; margin-bottom: 25px; }
        .hk-tab-btn { border: none; padding: 8px 25px; border-radius: 50px; font-weight: 700; background: transparent; }
        .hk-tab-btn.active { background: white; color: var(--hk-primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="hk-nav shadow-sm">
        <div class="d-flex align-items-center gap-3">
            <span class="fw-800 fs-4 text-success"><i class="fas fa-pills me-2"></i>HK PHARMACY</span>
        </div>
        <div class="d-flex gap-2">
            <div class="nav-link active" onclick="switchView('ordersView', this)">Orders</div>
            <div class="nav-link" onclick="switchView('inventoryView', this)">My Store</div>
            <div class="nav-link" onclick="switchView('masterSearchView', this)">Add Medicine</div>
        </div>
        <div class="dropdown">
            <img src="https://ui-avatars.com/api/?name=Pharmacy&background=00b894&color=fff" class="rounded-circle border" width="40" style="cursor:pointer">
        </div>
    </nav>

    <div class="container py-4">

        <!-- SECTION 1: ORDERS DASHBOARD -->
        <section id="ordersView" class="view-section active">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-800 m-0">Incoming Orders</h3>
                <div class="hk-tabs">
                    <button class="hk-tab-btn active" id="tabGen" onclick="loadOrders('General')">General</button>
                    <button class="hk-tab-btn" id="tabPres" onclick="loadOrders('Prescription')">Prescription</button>
                </div>
            </div>
            <div id="orderGrid" class="row g-4"></div>
        </section>

        <!-- SECTION 2: MY INVENTORY -->
        <section id="inventoryView" class="view-section">
            <h3 class="fw-800 mb-4">Store Inventory</h3>
            <div class="hk-card">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Medicine</th>
                                <th>MRP</th>
                                <th>Your Price</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- SECTION 3: MASTER SEARCH (ADD NEW) -->
        <section id="masterSearchView" class="view-section">
            <div class="hk-card mb-4">
                <h4 class="fw-800">Add New Medicine to Store</h4>
                <p class="text-muted">Search from our master database of 50k+ medicines</p>
                <div class="input-group mb-3">
                    <input type="text" id="masterSearchInp" class="form-control rounded-start-pill ps-4" placeholder="Search by name or salt...">
                    <button class="btn btn-dark rounded-end-pill px-4" onclick="searchMaster()">Search</button>
                </div>
            </div>
            <div id="masterResults" class="row g-3"></div>
        </section>

    </div>

    <!-- MODAL: ASSIGN DRIVER -->
    <div class="modal fade" id="assignDriverModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3 rounded-4">
                <div class="modal-header border-0"><h5 class="fw-800">Assign Delivery Boy</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div id="driverList" class="d-grid gap-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: ADD TO INVENTORY -->
    <div class="modal fade" id="addInventoryModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4 rounded-4">
                <h5 class="fw-800 mb-3">Inventory Details</h5>
                <input type="hidden" id="targetMedId">
                <div class="mb-3"><label class="small fw-bold">Selling Price (₹)</label><input type="number" id="vPrice" class="form-control"></div>
                <div class="mb-3"><label class="small fw-bold">Stock Quantity</label><input type="number" id="vStock" class="form-control"></div>
                <div class="mb-3"><label class="small fw-bold">Expiry Date</label><input type="date" id="vExpiry" class="form-control"></div>
                <button class="btn btn-hk w-100" onclick="submitToInventory()">Save to Store</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = "http://localhost:5002";
        const TOKEN = localStorage.getItem('pharmacytoken'); // Variable storage

        // Global State
        let currentOrderId = null;

        async function apiFetch(endpoint, method = 'GET', body = null) {
            const options = { 
                method, 
                headers: { 
                    'Authorization': `Bearer ${TOKEN}`,
                    'Content-Type': 'application/json'
                }
            };
            if(body) options.body = JSON.stringify(body);
            const res = await fetch(`${API_BASE}${endpoint}`, options);
            const r = await res.json();
            if(!res.ok) throw new Error(r.message || "Something went wrong");
            return r;
        }

        function switchView(id, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');

            if(id === 'ordersView') loadOrders('General');
            if(id === 'inventoryView') loadInventory();
        }

        // --- ORDER MANAGEMENT ---
        async function loadOrders(type) {
            document.getElementById('tabGen').classList.toggle('active', type === 'General');
            document.getElementById('tabPres').classList.toggle('active', type === 'Prescription');
            
            try {
                const res = await apiFetch(`/provider/pharmacy/orders/list?orderType=${type}`);
                const grid = document.getElementById('orderGrid');
                grid.innerHTML = res.data.map(o => `
                    <div class="col-md-6 col-lg-4">
                        <div class="hk-card">
                            <div class="d-flex justify-content-between mb-3">
                                <span class="fw-800 text-muted">#${o.orderId}</span>
                                <span class="status-badge bg-light text-dark">${o.status}</span>
                            </div>
                            <h6 class="fw-800 mb-1">${o.userId?.name || 'Walk-in User'}</h6>
                            <p class="small text-muted"><i class="fas fa-map-marker-alt me-1"></i> ${o.address?.city || 'N/A'}</p>
                            <hr>
                            <div class="mb-3">
                                ${type === 'General' ? 
                                    o.items.map(i => `<div class="small d-flex justify-content-between"><span>${i.name} x${i.quantity}</span><b>₹${i.price}</b></div>`).join('') :
                                    `<div class="d-flex gap-2 overflow-auto">${o.prescriptionImages.map(img => `<img src="${img}" width="60" class="rounded">`).join('')}</div>`
                                }
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <h5 class="fw-800 text-success mb-0">₹${o.billSummary.totalAmount}</h5>
                                ${o.deliveryStatus === 'PendingAssignment' ? 
                                    `<button class="btn btn-sm btn-dark rounded-pill px-3" onclick="openDriverModal('${o._id}')">Assign Driver</button>` :
                                    `<span class="small text-primary fw-bold"><i class="fas fa-truck me-1"></i> ${o.deliveryStatus}</span>`
                                }
                            </div>
                        </div>
                    </div>
                `).join('') || '<div class="text-center py-5">No orders found</div>';
            } catch (e) { console.error(e); }
        }

        // --- DRIVER ASSIGNMENT ---
        async function openDriverModal(orderId) {
            currentOrderId = orderId;
            const modal = new bootstrap.Modal(document.getElementById('assignDriverModal'));
            modal.show();

            try {
                const res = await apiFetch('/provider/pharmacy/orders/available-drivers');
                const list = document.getElementById('driverList');
                list.innerHTML = res.data.map(d => `
                    <div class="d-flex align-items-center justify-content-between p-3 border rounded-4">
                        <div class="d-flex align-items-center gap-3">
                            <img src="${d.profilePic || 'https://ui-avatars.com/api/?name='+d.name}" class="rounded-circle" width="45">
                            <div><b class="d-block">${d.name}</b><small class="text-muted">${d.vehicleNumber}</small></div>
                        </div>
                        <button class="btn btn-sm btn-hk" onclick="assignDriver('${d._id}')">Assign</button>
                    </div>
                `).join('') || 'No drivers available online';
            } catch (e) { }
        }

        async function assignDriver(driverId) {
            try {
                await apiFetch('/provider/pharmacy/orders/assign-manual', 'POST', { orderId: currentOrderId, driverId });
                Swal.fire('Success', 'Driver Assigned Successfully', 'success');
                bootstrap.Modal.getInstance(document.getElementById('assignDriverModal')).hide();
                loadOrders('General');
            } catch (e) { Swal.fire('Error', e.message, 'error'); }
        }

        // --- INVENTORY MANAGEMENT ---
        async function loadInventory() {
            try {
                const res = await apiFetch('/provider/pharmacy/inventory/my-list');
                const tbody = document.getElementById('inventoryTableBody');
                tbody.innerHTML = res.data.map(i => `
                    <tr>
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <img src="${i.medicineId.image_url[0]}" class="med-thumb">
                                <div><b class="d-block">${i.medicineId.name}</b><small class="text-muted">${i.medicineId.manufacturers}</small></div>
                            </div>
                        </td>
                        <td>₹${i.medicineId.mrp}</td>
                        <td class="fw-bold text-success">₹${i.vendor_price}</td>
                        <td>${i.stock_quantity > 0 ? `<span class="badge bg-success">${i.stock_quantity}</span>` : `<span class="badge bg-danger">Out of Stock</span>`}</td>
                        <td><button class="btn btn-sm btn-outline-dark" onclick="editInv('${i._id}', ${i.vendor_price}, ${i.stock_quantity})"><i class="fas fa-edit"></i></button></td>
                    </tr>
                `).join('');
            } catch (e) { }
        }

        // --- MASTER MEDICINE SEARCH ---
        async function searchMaster() {
            const query = document.getElementById('masterSearchInp').value;
            if(!query) return;

            try {
                const res = await apiFetch(`/provider/pharmacy/inventory/getMaster?query=${query}`);
                const resDiv = document.getElementById('masterResults');
                resDiv.innerHTML = res.data.map(m => `
                    <div class="col-md-6">
                        <div class="hk-card d-flex flex-row align-items-center gap-3 p-3">
                            <img src="${m.image_url[0]}" class="med-thumb">
                            <div class="flex-grow-1">
                                <b class="d-block">${m.name}</b>
                                <small class="text-muted">MRP: ₹${m.mrp}</small>
                            </div>
                            <button class="btn btn-sm btn-hk" onclick="openAddInvModal('${m._id}')">Add to Store</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { }
        }

        function openAddInvModal(id) {
            document.getElementById('targetMedId').value = id;
            new bootstrap.Modal(document.getElementById('addInventoryModal')).show();
        }

        async function submitToInventory() {
            const body = {
                medicineId: document.getElementById('targetMedId').value,
                vendor_price: document.getElementById('vPrice').value,
                stock_quantity: document.getElementById('vStock').value,
                expiry_date: document.getElementById('vExpiry').value
            };
            try {
                await apiFetch('/provider/pharmacy/inventory/add', 'POST', body);
                Swal.fire('Added', 'Medicine added to your inventory', 'success');
                bootstrap.Modal.getInstance(document.getElementById('addInventoryModal')).hide();
                loadInventory();
            } catch (e) { Swal.fire('Error', e.message, 'error'); }
        }

        window.onload = () => { if(TOKEN) loadOrders('General'); };
    </script>
</body>
</html>

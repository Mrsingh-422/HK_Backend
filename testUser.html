<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Kangaroo | Comprehensive Lab Flow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00a651; --bg: #f8f9fa; }
        body { background-color: var(--bg); font-family: 'Poppins', sans-serif; padding-top: 85px; }
        
        .navbar-custom { background: white; border-bottom: 2px solid var(--primary); position: fixed; top: 0; width: 100%; z-index: 1000; height: 75px; }
        .cart-badge { position: absolute; top: 0; right: 0; background: #ff3b30; color: white; border-radius: 50%; padding: 2px 7px; font-size: 11px; border: 2px solid white; }
        
        .nav-link.active { background-color: var(--primary) !important; color: white !important; }
        .card-common { border: none; border-radius: 18px; transition: 0.3s; background: white; height: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden; }
        .hidden { display: none !important; }

        /* Slots & Patients */
        .slot-pill { cursor: pointer; border: 1px solid #ddd; border-radius: 10px; padding: 10px; text-align: center; transition: 0.2s; background: white; }
        .slot-pill.active { background: var(--primary); color: white; border-color: var(--primary); }
        .slot-pill.full { background: #eee; color: #aaa; cursor: not-allowed; }
        
        .patient-card { cursor: pointer; border: 2px solid transparent; border-radius: 12px; transition: 0.3s; background: #f8f9fa; }
        .patient-card.selected { border-color: var(--primary); background: #e8f5e9; }

        .price-summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .price-total { border-top: 2px dashed #ddd; padding-top: 10px; font-weight: 800; font-size: 1.2rem; color: var(--primary); }
        
        .coupon-box { border: 2px dashed var(--primary); border-radius: 12px; padding: 15px; background: #f0fdf4; cursor: pointer; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar-custom d-flex align-items-center px-4 justify-content-between shadow-sm">
    <h3 class="m-0 fw-bold text-success" onclick="switchView('discoveryPage')" style="cursor:pointer">
        <i class="fas fa-kangaroo me-2"></i>Health Kangaroo
    </h3>
    <div class="d-flex gap-3 align-items-center">
        <button class="btn btn-sm btn-outline-dark rounded-pill" onclick="switchView('historyPage')">My Bookings</button>
        <div class="position-relative p-2" style="cursor:pointer" data-bs-toggle="offcanvas" data-bs-target="#cartSidebar" onclick="loadCart()">
            <i class="fas fa-shopping-basket fa-lg text-dark"></i>
            <span class="cart-badge" id="cartCount">0</span>
        </div>
    </div>
</nav>

<div class="container py-4">

    <!-- PAGE 1: DISCOVERY (Standard Catalog) -->
    <div id="discoveryPage">
        <div class="text-center mb-5">
            <h2 class="fw-bold">Smart Lab Booking</h2>
            <p class="text-muted">Compare prices and select verified labs</p>
        </div>
        <ul class="nav nav-pills justify-content-center mb-5">
            <li class="nav-item"><button class="nav-link active rounded-pill me-2" onclick="setCatalogType('test', this)">Tests</button></li>
            <li class="nav-item"><button class="nav-link rounded-pill" onclick="setCatalogType('package', this)">Packages</button></li>
        </ul>
        <div class="row g-4" id="catalogContainer"></div>
    </div>

    <!-- PAGE 2: COMPARISON -->
    <div id="comparisonPage" class="hidden">
        <button class="btn btn-sm btn-dark rounded-pill mb-4 px-4" onclick="switchView('discoveryPage')"><i class="fas fa-arrow-left"></i></button>
        <div class="row">
            <div class="col-md-4"><div id="masterInfoCard" class="card-common p-4"></div></div>
            <div class="col-md-8"><h5 class="fw-bold mb-3">Available Labs</h5><div id="labsComparisonList"></div></div>
        </div>
    </div>

    <!-- PAGE 3: CHECKOUT FLOW -->
    <div id="checkoutPage" class="hidden">
        <h2 class="fw-bold mb-4">Complete Your Booking</h2>
        <div class="row">
            <div class="col-lg-8">
                <!-- 1. Patient Selection -->
                <div class="card-common p-4 mb-4">
                    <h5 class="fw-bold mb-3"><i class="fas fa-users text-primary me-2"></i>Select Patient(s)</h5>
                    <div class="row g-3" id="patientList"></div>
                </div>

                <!-- 2. Date & Slot Selection -->
                <div class="card-common p-4 mb-4">
                    <h5 class="fw-bold mb-3"><i class="fas fa-calendar-alt text-primary me-2"></i>Appointment Slot</h5>
                    <input type="date" id="bookDate" class="form-control mb-3" onchange="fetchSlots()">
                    <div class="row g-2" id="slotsGrid">
                        <p class="text-muted small">Please select a date to see available slots</p>
                    </div>
                </div>

                <!-- 3. Collection Type & Address -->
                <div class="card-common p-4 mb-4">
                    <h5 class="fw-bold mb-3"><i class="fas fa-map-marker-alt text-primary me-2"></i>Collection Type</h5>
                    <div class="btn-group w-100 mb-3" role="group">
                        <input type="radio" class="btn-check" name="collType" id="visitLab" value="Visit Lab" checked onchange="toggleAddress(false)">
                        <label class="btn btn-outline-success" for="visitLab">Visit Lab (Free)</label>
                        
                        <input type="radio" class="btn-check" name="collType" id="homeColl" value="Home Collection" onchange="toggleAddress(true)">
                        <label class="btn btn-outline-success" for="homeColl" id="homeCollLabel">Home Collection</label>
                    </div>
                    <div id="addressSection" class="hidden">
                        <label class="small fw-bold">Full Address</label>
                        <textarea id="fullAddress" class="form-control" rows="2" placeholder="House no, Floor, Locality..."></textarea>
                        <div class="row mt-2">
                            <div class="col-6"><input type="text" id="city" class="form-control" placeholder="City"></div>
                            <div class="col-6"><input type="text" id="pincode" class="form-control" placeholder="Pincode"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT SIDE: BILLING -->
            <div class="col-lg-4">
                <div class="card-common p-4 sticky-top" style="top:100px">
                    <h5 class="fw-bold mb-3">Order Summary</h5>
                    <div id="billSummaryArea"></div>
                    <hr>
                    <div class="mb-3">
                        <label class="small fw-bold">Apply Coupon</label>
                        <div class="input-group">
                            <input type="text" id="couponInput" class="form-control" placeholder="CODE10">
                            <button class="btn btn-dark" onclick="applyCoupon()">APPLY</button>
                        </div>
                        <div id="couponList" class="mt-2"></div>
                    </div>
                    <button class="btn btn-success w-100 py-3 fw-bold rounded-pill" onclick="placeOrder()">PAY & CONFIRM</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGE 4: HISTORY -->
    <div id="historyPage" class="hidden">
        <h3 class="fw-bold mb-4">My Bookings</h3>
        <div class="row g-3" id="bookingsContainer"></div>
    </div>

</div>

<!-- CART SIDEBAR -->
<div class="offcanvas offcanvas-end" id="cartSidebar">
    <div class="offcanvas-header border-bottom px-4"><h5 class="fw-bold m-0">Your Cart</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body">
        <div id="cartItemsList"></div>
    </div>
    <div class="offcanvas-footer p-4 border-top">
        <button class="btn btn-success w-100 py-3 fw-bold rounded-pill" onclick="switchView('checkoutPage')">PROCEED TO CHECKOUT</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const BASE_URL = 'http://localhost:5002';
    const token = localStorage.getItem('token');
    let currentCatalogType = 'test';
    let cart = null;
    let selectedPatients = ['Self'];
    let selectedSlot = '';

    // --- VIEW LOGIC ---
    function switchView(pageId) {
        ['discoveryPage', 'comparisonPage', 'checkoutPage', 'historyPage'].forEach(p => {
            document.getElementById(p).classList.add('hidden');
        });
        document.getElementById(pageId).classList.remove('hidden');
        if(pageId === 'checkoutPage') initCheckout();
        if(pageId === 'historyPage') loadBookings();
    }

    // --- CATALOG & COMPARISON ---
    function setCatalogType(type, btn) {
        currentCatalogType = type;
        document.querySelectorAll('.nav-pills .nav-link').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        loadCatalog();
    }

    async function loadCatalog() {
        const endpoint = currentCatalogType === 'test' ? '/provider/labs/services/tests/standard-catalog' : '/provider/labs/services/packages/standard-catalog';
        const res = await fetch(`${BASE_URL}${endpoint}`);
        const data = (await res.json()).data;
        document.getElementById('catalogContainer').innerHTML = data.map(item => `
            <div class="col-md-3">
                <div class="card-common p-3 card-catalog" onclick="compareLabs('${item._id}')">
                    <span class="badge bg-light text-success border mb-2">${item.category || 'Health'}</span>
                    <h6 class="fw-bold">${item.testName || item.packageName}</h6>
                    <div class="mt-3 small text-muted">Standard Price: <b>₹${item.standardMRP}</b></div>
                </div>
            </div>`).join('');
    }

    async function compareLabs(masterId) {
        const mUrl = currentCatalogType === 'test' ? `/user/labs/master-test/${masterId}` : `/user/labs/master-package/${masterId}`;
        const mData = (await (await fetch(`${BASE_URL}${mUrl}`, { headers: { 'Authorization': `Bearer ${token}` }})).json()).data;
        
        document.getElementById('masterInfoCard').innerHTML = `<h5 class='fw-bold text-success'>${mData.testName || mData.packageName}</h5><hr><p class='small text-muted'>${mData.shortDescription || 'Verified Lab Procedure'}</p>`;

        const cUrl = currentCatalogType === 'test' ? `/user/labs/comparison/test/${masterId}` : `/user/labs/comparison/package/${masterId}`;
        const cRes = await (await fetch(`${BASE_URL}${cUrl}`, { headers: { 'Authorization': `Bearer ${token}` }})).json();

        document.getElementById('labsComparisonList').innerHTML = cRes.data.map(entry => `
            <div class="card-common p-3 mb-3 d-flex justify-content-between align-items-center border-start border-success border-4">
                <div><h6 class="fw-bold mb-0">${entry.labId.name}</h6><small class="text-muted">${entry.labId.city}</small></div>
                <div class="text-end">
                    <div class="price-text">₹${entry.discountPrice || entry.offerPrice}</div>
                    <button class="btn btn-success btn-sm rounded-pill mt-1" onclick="addToCart('${entry.labId._id}', '${entry._id}', '${currentCatalogType === 'test' ? 'LabTest' : 'LabPackage'}')">Add to Cart</button>
                </div>
            </div>`).join('');
        switchView('comparisonPage');
    }

    // --- CART LOGIC ---
    async function addToCart(labId, itemId, productType, forceReplace = false) {
        const res = await fetch(`${BASE_URL}/user/cart/lab/add`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ labId, itemId, productType, forceReplace })
        });
        const result = await res.json();
        if(result.success) { Swal.fire('Added!', '', 'success'); loadCart(); }
        else if(result.canReplace) {
            if(confirm(result.message)) addToCart(labId, itemId, productType, true);
        } else Swal.fire('Wait', result.message, 'warning');
    }

    async function loadCart() {
        const res = await fetch(`${BASE_URL}/user/cart`, { headers: { 'Authorization': `Bearer ${token}` }});
        const result = await res.json();
        cart = result.data.labCart;
        document.getElementById('cartCount').innerText = cart.items.length;
        document.getElementById('cartItemsList').innerHTML = cart.items.map(i => `<div class="p-2 border-bottom small d-flex justify-content-between"><span>${i.name}</span><b>₹${i.price}</b></div>`).join('');
    }

    // --- CHECKOUT LOGIC ---
    async function initCheckout() {
        if(!cart || cart.items.length === 0) { switchView('discoveryPage'); return; }
        
        // 1. Radiology Check
        if(cart.categoryType === 'Radiology') {
            document.getElementById('visitLab').checked = true;
            document.getElementById('homeColl').disabled = true;
            document.getElementById('homeCollLabel').innerText = "Home Collection (N/A for Radiology)";
            toggleAddress(false);
        } else {
            document.getElementById('homeColl').disabled = false;
            document.getElementById('homeCollLabel').innerText = "Home Collection";
        }

        // 2. Load Patients (Mocking from User Profile)
        const userRes = await fetch(`${BASE_URL}/user/profile`, { headers: { 'Authorization': `Bearer ${token}` }});
        const user = (await userRes.json()).data;
        document.getElementById('patientList').innerHTML = `
            <div class="col-md-4"><div class="patient-card p-3 selected" onclick="togglePatient('Self', this)"><b>Self</b><br><small>${user.name}</small></div></div>
            ${user.familyMember.map(m => `<div class="col-md-4"><div class="patient-card p-3" onclick="togglePatient('${m._id}', this)"><b>${m.relation}</b><br><small>${m.memberName}</small></div></div>`).join('')}
        `;

        // 3. Load Available Coupons
        const cRes = await fetch(`${BASE_URL}/user/labs/coupons?labId=${cart.labId._id}`, { headers: { 'Authorization': `Bearer ${token}` }});
        const coupons = (await cRes.json()).data;
        document.getElementById('couponList').innerHTML = coupons.map(c => `
            <div class="coupon-box mb-2" onclick="document.getElementById('couponInput').value='${c.couponName}'">
                <div class="fw-bold text-success">${c.couponName}</div>
                <div class="extra-small text-muted">Get ${c.discountPercentage}% off upto ₹${c.maxDiscount}</div>
            </div>`).join('');

        updateSummary();
    }

    async function fetchSlots() {
        const date = document.getElementById('bookDate').value;
        const res = await fetch(`${BASE_URL}/user/labs/slots?labId=${cart.labId._id}&date=${date}`, { headers: { 'Authorization': `Bearer ${token}` }});
        const result = await res.json();
        document.getElementById('slotsGrid').innerHTML = result.slots.map(s => `
            <div class="col-4"><div class="slot-pill ${s.isFull?'full':''}" onclick="selectSlot('${s.time}', this)">${s.time}</div></div>
        `).join('');
    }

    function selectSlot(time, el) {
        if(el.classList.contains('full')) return;
        document.querySelectorAll('.slot-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        selectedSlot = time;
    }

    function togglePatient(id, el) {
        el.classList.toggle('selected');
        if(selectedPatients.includes(id)) selectedPatients = selectedPatients.filter(p => p !== id);
        else selectedPatients.push(id);
        updateSummary();
    }

    function toggleAddress(show) {
        document.getElementById('addressSection').classList.toggle('hidden', !show);
        updateSummary();
    }

    function updateSummary() {
        let itemsTotal = cart.items.reduce((acc, i) => acc + i.price, 0);
        let delivery = document.getElementById('homeColl').checked ? 100 : 0;
        let total = itemsTotal + delivery;
        
        document.getElementById('billSummaryArea').innerHTML = `
            <div class="price-summary-row"><span>Items Total</span><span>₹${itemsTotal}</span></div>
            <div class="price-summary-row"><span>Collection Fee</span><span>₹${delivery}</span></div>
            <div class="price-summary-row price-total"><span>Net Payable</span><span>₹${total}</span></div>
        `;
        document.getElementById('totalPayable').innerText = `₹${total}`;
    }

    async function placeOrder() {
        const collType = document.querySelector('input[name="collType"]:checked').value;
        const body = {
            appointmentDate: document.getElementById('bookDate').value,
            appointmentTime: selectedSlot,
            collectionType: collType,
            address: collType === 'Home Collection' ? {
                houseNo: document.getElementById('fullAddress').value,
                city: document.getElementById('city').value,
                pincode: document.getElementById('pincode').value
            } : {},
            selectedPatientIds: selectedPatients,
            paymentMethod: 'COD',
            isRapid: false
        };

        if(!body.appointmentDate || !body.appointmentTime) return Swal.fire('Select Slot', '', 'warning');
        
        const res = await fetch(`${BASE_URL}/user/labs/checkout`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const result = await res.json();
        if(result.success) {
            Swal.fire('Order Placed!', 'Order ID: ' + result.data.bookingId, 'success');
            switchView('historyPage');
        } else {
            Swal.fire('Error', result.message, 'error');
        }
    }

    async function loadBookings() {
        const res = await fetch(`${BASE_URL}/user/labs/my-bookings`, { headers: { 'Authorization': `Bearer ${token}` }});
        const result = await res.json();
        document.getElementById('bookingsContainer').innerHTML = result.data.map(b => `
            <div class="col-md-6">
                <div class="card-common p-3 border-start border-4 border-${b.status==='Cancelled'?'danger':'success'}">
                    <div class="d-flex justify-content-between small text-muted fw-bold"><span>ID: ${b.bookingId}</span><span>${b.status}</span></div>
                    <h6 class="fw-bold mt-2">${b.labId.name}</h6>
                    <p class="small m-0"><i class="far fa-clock"></i> ${b.appointmentTime} | ${new Date(b.appointmentDate).toDateString()}</p>
                    <div class="mt-3 pt-2 border-top d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-success">₹${b.billSummary.totalAmount}</span>
                        <button class="btn btn-sm btn-outline-dark rounded-pill">Details</button>
                    </div>
                </div>
            </div>`).join('');
    }

    window.onload = loadCatalog;
</script>
</body>
</html>
